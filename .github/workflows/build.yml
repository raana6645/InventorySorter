name: Build InventorySorter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile with Roslyn csc
        shell: cmd
        run: |
          set CSC="C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\Roslyn\csc.exe"
          if not exist %CSC% set CSC="C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\Roslyn\csc.exe"
          where csc || (echo Using dotnet csc fallback && set CSC=csc)
          
          "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" ^
            /target:library ^
            /out:InventorySorter.dll ^
            /reference:Dependencies\Assembly-CSharp.dll ^
            /reference:Dependencies\Rocket.API.dll ^
            /reference:Dependencies\Rocket.Core.dll ^
            /reference:Dependencies\Rocket.Unturned.dll ^
            /reference:Dependencies\UnityEngine.dll ^
            /reference:Dependencies\UnityEngine.CoreModule.dll ^
            /reference:Dependencies\netstandard.dll ^
            /reference:Dependencies\UnturnedDat.dll ^
            Main.cs

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: InventorySorter
          path: InventorySorter.dll
